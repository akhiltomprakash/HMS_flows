<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hospital HIS Explorer</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Interactive product map</p>
          <h1>Hospital HIS Explorer</h1>
        </div>
        <div class="top-actions">
          <button class="icon-btn" id="themeBtn" type="button" aria-label="Toggle dark mode">
            ◐
          </button>
          <nav class="tabs" aria-label="Product type">
            <button class="tab active" type="button" data-product="hospital">Hospital</button>
            <button class="tab" type="button" data-product="clinic">Clinic</button>
          </nav>
        </div>
      </header>

      <section class="workspace">
        <div class="map-card">
          <div class="map-toolbar">
            <div>
              <strong id="mapTitle">Hospital module map</strong>
              <span>Click and drag a module to focus its direct flows.</span>
            </div>
            <div class="map-actions">
              <button class="tool-btn primary icon-only" id="fullscreenBtn" type="button" aria-label="Full screen">
                ⛶
              </button>
            </div>
          </div>
          <div class="map-stage" id="mapStage">
            <div class="map-content" id="mapContent">
              <svg class="connections" viewBox="0 0 1600 2050" aria-hidden="true">
                <defs>
                  <marker
                    id="arrow"
                    markerHeight="8"
                    markerWidth="8"
                    orient="auto"
                    refX="7"
                    refY="4"
                  >
                    <path d="M0,0 L8,4 L0,8 Z" fill="currentColor"></path>
                  </marker>
                </defs>
                <g id="connectionLayer"></g>
              </svg>
              <div id="nodeLayer"></div>
            </div>
          </div>
        </div>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
